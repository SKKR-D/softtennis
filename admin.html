<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【本部用】緊急連絡更新</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f0f0; padding: 20px; }
        .container { background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"], input[type="time"] { width: 100%; padding: 10px; margin-top: 5px; font-size: 1.1rem; border: 1px solid #ccc; border-radius: 4px; }
        
        .radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .radio-group label { padding: 15px; text-align: center; background: #eee; border-radius: 4px; margin-top: 0; cursor: pointer; border: 2px solid transparent; }
        .radio-group input { display: none; }
        .radio-group input:checked + span { font-weight: bold; }
        
        .radio-group label:has(input[value="wait_all"]:checked) { border-color: #d32f2f; background: #ffebee; color: #d32f2f; }
        .radio-group label:has(input[value="meeting"]:checked) { border-color: #f57f17; background: #fff8e1; color: #f57f17; }
        .radio-group label:has(input[value="resume"]:checked) { border-color: #1976d2; background: #e3f2fd; color: #1976d2; }

        #meetingTimeArea { display: none; margin-top: 10px; background: #fff8e1; padding: 15px; border-radius: 4px; border: 1px dashed #f57f17; }

        button { margin-top: 25px; width: 100%; padding: 15px; background: #1976d2; color: white; border: none; border-radius: 4px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        button:disabled { background: #999; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>状況更新パネル</h1>
        
        <label>日付</label>
        <input type="text" id="dateText" placeholder="例: 7月19日（日）">
        
        <label>現在の時刻</label>
        <input type="time" id="timeText">
        
        <label>状況を選択</label>
        <div class="radio-group">
            <label><input type="radio" name="statusType" value="wait_all" checked> <span>全員待機</span></label>
            <label><input type="radio" name="statusType" value="meeting"> <span>待機 ＋ 監督会議</span></label>
            <label><input type="radio" name="statusType" value="resume"> <span>20分後競技再開</span></label>
        </div>

        <div id="meetingTimeArea">
            <label>監督会議の開始時刻を指定</label>
            <input type="time" id="meetingTime">
        </div>

        <button onclick="updateStatus()">更新する</button>
        <div id="msg"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx5gcEOsmqJJs-rD31RSwvyS7KzaYB1XAlduPqNnwN98BjzROqI3XPYNSHtCRTARpnJ/exec";

        window.onload = () => {
            const now = new Date();
            const days = ["日", "月", "火", "水", "木", "金", "土"];
            document.getElementById('dateText').value = `${now.getMonth() + 1}月${now.getDate()}日（${days[now.getDay()]}）`;
            
            const currentTime = `${("0" + now.getHours()).slice(-2)}:${("0" + now.getMinutes()).slice(-2)}`;
            document.getElementById('timeText').value = currentTime;
            document.getElementById('meetingTime').value = currentTime;
        };

        document.querySelectorAll('input[name="statusType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const area = document.getElementById('meetingTimeArea');
                area.style.display = (e.target.value === 'meeting') ? 'block' : 'none';
            });
        });

        function updateStatus() {
            const btn = document.querySelector('button');
            const msg = document.getElementById('msg');
            btn.disabled = true;
            btn.innerText = "送信中...";
            msg.innerText = "";

            const type = document.querySelector('input[name="statusType"]:checked').value;
            let finalStatusText = "";

            if (type === "wait_all") {
                finalStatusText = "全員待機";
            } else if (type === "meeting") {
                const mTime = document.getElementById('meetingTime').value || "未定";
                // 閲覧画面で「／」の代わりに綺麗に改行されるように <br> を使います
                finalStatusText = `選手・保護者（観客）待機<br>${mTime}から監督会議を行います`;
            } else if (type === "resume") {
                finalStatusText = "20分後競技再開";
            }

            const data = {
                dateText: document.getElementById('dateText').value,
                timeText: document.getElementById('timeText').value,
                status: finalStatusText
            };

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(res => {
                msg.innerText = "更新が完了しました！";
                msg.style.color = "green";
                btn.disabled = false;
                btn.innerText = "更新する";
                setTimeout(() => msg.innerText = "", 3000);
            })
            .catch(err => {
                msg.innerText = "エラーが発生しました";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = "更新する";
            });
        }
    </script>
</body>
</html>
