<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>県中総体団体戦決勝リーグ 速報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #eef3f8;
  --c-surface: #ffffff;
  --c-surface2: #e2eaf2;
  --c-male: #0d4d8c;
  --c-male-light: #e3edf7;
  --c-female: #a3216b;
  --c-female-light: #f5e6ef;
  --c-accent: #1976d2;
  --c-success: #2e7d32;
  --c-success-light: #e8f5e9;
  --c-danger: #d32f2f;
  --c-warn: #f57c00;
  --c-warn-light: #fff4e5;
  --c-text: #1a1a1a;
  --c-text2: #5f6b7a;
  --c-border: #c4d2e0;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --font-ja: 'Noto Sans JP', sans-serif;
  --font-en: 'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-ja);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* Beta banner */
.beta-banner {
  background: var(--c-warn-light);
  border-bottom: 3px solid var(--c-warn);
  padding: 8px 16px;
  text-align: center;
  font-size: 12px;
  color: #333;
  line-height: 1.5;
}
.beta-banner strong { color: var(--c-warn); font-weight: 700; }

/* Header */
.header {
  background: linear-gradient(135deg, #0d4d8c 0%, #1976d2 100%);
  color: #fff;
  padding: 24px 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.header h1 { font-size: 22px; font-weight: 900; }
.header .subtitle { font-size: 14px; font-weight: 700; margin-top: 4px; opacity: 0.9; }
.header .live-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  background: rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.header .live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ff5252;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.header .clock {
  font-family: var(--font-en);
  font-size: 24px;
  font-weight: 900;
  margin-top: 6px;
}
.header .last-update {
  font-size: 11px;
  opacity: 0.85;
  margin-top: 4px;
}

/* Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px;
}

/* Gender tabs */
.gender-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--c-surface);
  padding: 6px;
  border-radius: var(--r-md);
  box-shadow: var(--shadow);
}
.gender-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  border-radius: var(--r-sm);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  background: var(--c-surface);
  color: var(--c-text2);
}
.gender-tab.active[data-gender="男子"] {
  background: var(--c-male);
  color: #fff;
  border-color: var(--c-male);
}
.gender-tab.active[data-gender="女子"] {
  background: var(--c-female);
  color: #fff;
  border-color: var(--c-female);
}

/* Section */
.section {
  background: var(--c-surface);
  border-radius: var(--r-md);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.section-title {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--c-border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .icon { font-size: 20px; }
.section-title.male { border-bottom-color: var(--c-male); color: var(--c-male); }
.section-title.female { border-bottom-color: var(--c-female); color: var(--c-female); }

/* Standings table */
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.standings-table th {
  background: var(--c-surface2);
  padding: 8px 4px;
  text-align: center;
  font-weight: 700;
  font-size: 11px;
  color: var(--c-text2);
}
.standings-table td {
  padding: 10px 4px;
  text-align: center;
  border-bottom: 1px solid var(--c-border);
}
.standings-table td.team-name {
  text-align: left;
  font-weight: 700;
  padding-left: 8px;
}
.standings-table td.rank {
  font-family: var(--font-en);
  font-weight: 900;
  font-size: 18px;
  width: 36px;
  color: var(--c-accent);
}
.standings-table td.wins { color: var(--c-success); font-weight: 700; }
.standings-table td.losses { color: var(--c-danger); }
.standings-table td.final-rank {
  font-weight: 900;
  color: var(--c-accent);
}

/* Matches list */
.match-card {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
  transition: all 0.15s;
}
.match-card.male { border-left: 4px solid var(--c-male); }
.match-card.female { border-left: 4px solid var(--c-female); }
.match-card.finished { background: var(--c-success-light); }
.match-card.in-progress { background: var(--c-warn-light); }

.match-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--c-text2);
  flex-wrap: wrap;
}
.match-header .match-id {
  font-family: var(--font-en);
  font-weight: 700;
  color: var(--c-text);
}
.match-header .round {
  font-weight: 700;
}
.match-header .court {
  background: var(--c-surface2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.match-header .status {
  margin-left: auto;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  background: var(--c-surface2);
  color: var(--c-text2);
}
.status.予定 { background: var(--c-surface2); color: var(--c-text2); }
.status.準備中 { background: #fff4e5; color: var(--c-warn); }
.status.オーダー確定 { background: #e3f2fd; color: var(--c-accent); }
.status.進行中 { background: var(--c-warn); color: #fff; }
.status.終了 { background: var(--c-success); color: #fff; }

.matchup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
}
.team-block {
  text-align: center;
}
.team-block.winner { position: relative; }
.team-block.winner .team-name-display {
  color: var(--c-success);
}
.team-block.winner::after {
  content: '👑';
  position: absolute;
  top: -8px;
  right: 4px;
  font-size: 16px;
}
.team-block .team-no {
  display: inline-block;
  font-family: var(--font-en);
  font-weight: 900;
  font-size: 20px;
  color: var(--c-accent);
  margin-bottom: 2px;
}
.team-block .team-name-display {
  font-weight: 700;
  font-size: 15px;
  line-height: 1.3;
}
.vs-score {
  text-align: center;
  font-family: var(--font-en);
  font-weight: 900;
  font-size: 24px;
  color: var(--c-text);
  min-width: 80px;
}
.vs-score.pending {
  color: var(--c-text2);
  font-size: 16px;
}

.match-time-info {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 6px;
  font-size: 11px;
  color: var(--c-text2);
}
.match-time-info .item {
  display: flex;
  gap: 4px;
}
.match-time-info .label {
  color: var(--c-text2);
}
.match-time-info .value {
  font-weight: 700;
  color: var(--c-text);
}

/* Details toggle */
.match-details {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--c-border);
}
.match-details.show { display: block; }
.details-toggle {
  display: block;
  width: 100%;
  padding: 6px;
  background: var(--c-surface2);
  border: none;
  border-radius: var(--r-sm);
  font-family: var(--font-ja);
  font-size: 12px;
  font-weight: 600;
  color: var(--c-text2);
  cursor: pointer;
  margin-top: 8px;
}
.details-toggle:hover { background: var(--c-border); }

.mini-match {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px dotted var(--c-border);
  font-size: 13px;
}
.mini-match:last-child { border-bottom: none; }
.mini-match .side {
  display: flex;
  flex-direction: column;
}
.mini-match .side.left { text-align: right; }
.mini-match .side.right { text-align: left; }
.mini-match .side.winner { font-weight: 700; color: var(--c-success); }
.mini-match .side.winner::before,
.mini-match .side.winner::after { content: '★'; color: #ffc107; margin: 0 3px; }
.mini-match .players {
  font-size: 12px;
  color: var(--c-text2);
}
.mini-match .players.open {
  color: var(--c-warn);
  font-weight: 700;
}
.mini-match .score {
  font-family: var(--font-en);
  font-weight: 900;
  font-size: 16px;
  padding: 4px 10px;
  background: var(--c-surface2);
  border-radius: 6px;
  min-width: 60px;
  text-align: center;
}
.mini-match .score.pending {
  color: var(--c-text2);
  font-size: 12px;
  font-weight: 600;
}
.mini-match-label {
  font-size: 11px;
  color: var(--c-text2);
  font-weight: 700;
  margin-bottom: 4px;
  text-align: center;
  background: var(--c-surface2);
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--c-text2);
}
.spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 4px solid rgba(0,0,0,0.1);
  border-top-color: var(--c-accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Copyright footer */
.copyright-notice {
  background: var(--c-surface);
  border: 2px solid var(--c-warn);
  border-radius: var(--r-md);
  padding: 12px 16px;
  margin: 20px 16px 0;
  font-size: 12px;
  color: var(--c-text2);
  line-height: 1.7;
}
.copyright-notice .title {
  font-weight: 700;
  color: var(--c-warn);
  margin-bottom: 4px;
}
.footer {
  text-align: center;
  margin: 24px 16px 0;
  padding-top: 16px;
  border-top: 1px solid var(--c-border);
  font-size: 11px;
  color: var(--c-text2);
}
</style>
</head>
<body>

<!-- Beta banner -->
<div class="beta-banner">
  <strong>⚠ β版（試験運用）</strong> このシステムは開発中のベータ版です。本部記録が正しいものになります。
</div>

<!-- Header -->
<div class="header">
  <h1>県中総体団体戦決勝リーグ</h1>
  <div class="subtitle">速報</div>
  <div class="live-indicator">
    <span class="live-dot"></span>
    <span>LIVE 自動更新中</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="last-update" id="lastUpdate">データ取得中...</div>
</div>

<!-- Container -->
<div class="container">
  <!-- Gender Tabs -->
  <div class="gender-tabs">
    <div class="gender-tab active" data-gender="男子" onclick="switchGender('男子')">男子</div>
    <div class="gender-tab" data-gender="女子" onclick="switchGender('女子')">女子</div>
  </div>
  
  <!-- Standings Section -->
  <div class="section">
    <div class="section-title male" id="standingsTitle">
      <span class="icon">🏆</span>
      <span>順位表</span>
    </div>
    <div id="standingsContainer">
      <div class="loading"><div class="spinner"></div><p>読み込み中...</p></div>
    </div>
  </div>
  
  <!-- Matches Section -->
  <div class="section">
    <div class="section-title male" id="matchesTitle">
      <span class="icon">🎾</span>
      <span>試合結果・進行状況</span>
    </div>
    <div id="matchesContainer">
      <div class="loading"><div class="spinner"></div><p>読み込み中...</p></div>
    </div>
  </div>
</div>

<!-- Copyright Notice -->
<div class="copyright-notice">
  <div class="title">📌 ご利用にあたって</div>
  このシステムは本大会の運営のために作成したものです。本部に許可なくシステム画面や内部データなどを公表することは禁止します。
</div>

<div class="footer">
  岩手県中体連ソフトテニス専門部
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzaMlWM2GdU7hhTUN1ArXX-9RLs79CqIad_a1VpF6cEXgheTZ8uNW4mnVYbP_xlpCzR0A/exec";
const REFRESH_INTERVAL_MS = 30000;  // 30秒

const state = {
  currentGender: '男子',
  liveData: null,
  refreshTimerId: null,
  clockTimerId: null
};

// ============================================================
// Clock
// ============================================================
const startClock = () => {
  const update = () => {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  };
  update();
  if (state.clockTimerId) clearInterval(state.clockTimerId);
  state.clockTimerId = setInterval(update, 1000);
};

// ============================================================
// Data fetch
// ============================================================
const fetchLiveData = async () => {
  try {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', 'getLiveData');
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    state.liveData = data;
    render();
    
    document.getElementById('lastUpdate').textContent = 
      `最終更新: ${data.updatedAt}`;
  } catch (err) {
    console.error('データ取得エラー:', err);
    document.getElementById('lastUpdate').textContent = 
      `更新エラー: ${err.message}`;
  }
};

// ============================================================
// Render
// ============================================================
const render = () => {
  if (!state.liveData) return;
  renderStandings();
  renderMatches();
};

const renderStandings = () => {
  const gender = state.currentGender;
  let teams = [...(state.liveData.standings[gender] || [])];
  
  if (teams.length === 0) {
    document.getElementById('standingsContainer').innerHTML = 
      '<p style="text-align:center;color:#5f6b7a;padding:20px;">データがありません</p>';
    return;
  }
  
  // matchesから各チームのNo.を取得
  const matches = state.liveData.matches || [];
  const teamNoMap = {};
  matches.forEach(m => {
    if (m.gender !== gender) return;
    if (m.leftTeam.id && m.leftTeam.no && !teamNoMap[m.leftTeam.id]) {
      teamNoMap[m.leftTeam.id] = m.leftTeam.no;
    }
    if (m.rightTeam.id && m.rightTeam.no && !teamNoMap[m.rightTeam.id]) {
      teamNoMap[m.rightTeam.id] = m.rightTeam.no;
    }
  });
  
  // No.を各チームに付与
  teams.forEach(t => {
    t.no = teamNoMap[t.id] || '';
  });
  
  // 成績順の順位を各チームに付与（GASから来た時点で既に成績順ソート済み）
  const rankByTeamId = {};
  teams.forEach((t, idx) => {
    rankByTeamId[t.id] = idx + 1;
  });
  
  // 全チーム3試合終了しているかチェック
  const allFinished = teams.length > 0 && teams.every(t => t.played === 3);
  const rankLabels = ['1位', '2位', '3位', '4位', '5位', '6位', '7位', '8位'];
  
  // No.順にソート（A, B, C, D）
  teams.sort((a, b) => String(a.no || '').localeCompare(String(b.no || '')));
  
  let html = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>No.</th>
          <th>チーム</th>
          <th>試合</th>
          <th>勝</th>
          <th>負</th>
          <th>確定順位</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  teams.forEach(t => {
    const rankNum = rankByTeamId[t.id] || 0;
    const finalRank = allFinished && rankNum > 0 ? rankLabels[rankNum - 1] : '';
    html += `
      <tr>
        <td class="rank">${t.no || '-'}</td>
        <td class="team-name">${t.shortName}</td>
        <td>${t.played}</td>
        <td class="wins">${t.wins}</td>
        <td class="losses">${t.losses}</td>
        <td class="final-rank">${finalRank}</td>
      </tr>
    `;
  });
  
  html += '</tbody></table>';
  document.getElementById('standingsContainer').innerHTML = html;
};

const renderMatches = () => {
  const gender = state.currentGender;
  const matches = (state.liveData.matches || [])
    .filter(m => m.gender === gender);
  
  if (matches.length === 0) {
    document.getElementById('matchesContainer').innerHTML = 
      '<p style="text-align:center;color:#5f6b7a;padding:20px;">試合データがありません</p>';
    return;
  }
  
  // 状態別に並べる：進行中 → オーダー確定 → 準備中 → 予定 → 終了
  const statusOrder = { '進行中': 0, 'オーダー確定': 1, '準備中': 2, '予定': 3, '終了': 4 };
  matches.sort((a, b) => {
    const s = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
    if (s !== 0) return s;
    return a.matchId.localeCompare(b.matchId);
  });
  
  let html = '';
  matches.forEach(m => {
    html += renderMatchCard(m);
  });
  
  document.getElementById('matchesContainer').innerHTML = html;
};

const renderMatchCard = (m) => {
  const genderClass = m.gender === '男子' ? 'male' : 'female';
  const statusClass = m.status === '終了' ? 'finished' 
                    : m.status === '進行中' ? 'in-progress' : '';
  
  // 勝者判定
  let leftWinner = false;
  let rightWinner = false;
  if (m.status === '終了' && m.teamResult) {
    const parts = m.teamResult.split('-').map(s => parseInt(s.trim(), 10));
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      if (parts[0] > parts[1]) leftWinner = true;
      else if (parts[1] > parts[0]) rightWinner = true;
    }
  }
  
  // スコア表示
  let scoreHtml;
  if (m.status === '終了' && m.teamResult) {
    scoreHtml = `<div class="vs-score">${m.teamResult.replace('-', ' - ')}</div>`;
  } else {
    scoreHtml = `<div class="vs-score pending">VS</div>`;
  }
  
  // 詳細セクション（オーダー・マッチ結果）
  const detailsHtml = renderMatchDetails(m);
  
  // 時刻情報
  const timeInfo = [];
  if (m.callTime) timeInfo.push({ label: '召集', value: m.callTime });
  if (m.startTime) timeInfo.push({ label: '開始', value: m.startTime });
  if (m.endTime) timeInfo.push({ label: '終了', value: m.endTime });
  const timeHtml = timeInfo.length > 0 ? `
    <div class="match-time-info">
      ${timeInfo.map(t => `<div class="item"><span class="label">${t.label}</span><span class="value">${t.value}</span></div>`).join('')}
    </div>
  ` : '';
  
  return `
    <div class="match-card ${genderClass} ${statusClass}">
      <div class="match-header">
        <span class="match-id">${m.matchId}</span>
        <span class="round">${m.round}</span>
        <span class="court">コート ${m.court}</span>
        <span class="status ${m.status}">${m.status}</span>
      </div>
      <div class="matchup">
        <div class="team-block ${leftWinner ? 'winner' : ''}">
          ${m.leftTeam.no ? `<div class="team-no">${m.leftTeam.no}</div>` : ''}
          <div class="team-name-display">${m.leftTeam.shortName}</div>
        </div>
        ${scoreHtml}
        <div class="team-block ${rightWinner ? 'winner' : ''}">
          ${m.rightTeam.no ? `<div class="team-no">${m.rightTeam.no}</div>` : ''}
          <div class="team-name-display">${m.rightTeam.shortName}</div>
        </div>
      </div>
      ${timeHtml}
      ${detailsHtml ? `
        <button class="details-toggle" onclick="toggleDetails('${m.matchId}')">
          詳細を表示 ▼
        </button>
        <div class="match-details" id="details-${m.matchId}">
          ${detailsHtml}
        </div>
      ` : ''}
    </div>
  `;
};

const renderMatchDetails = (m) => {
  const leftOrder = m.leftTeam.order;
  const rightOrder = m.rightTeam.order;
  
  // オーダーが両方揃っている場合のみ詳細表示
  if (!leftOrder || !rightOrder) {
    return '';
  }
  
  let html = '';
  
  [1, 2, 3].forEach(mn => {
    const idx = mn - 1;
    const result = m.matchResults[idx] || { score: '', winner: '' };
    const lA = leftOrder[mn].A || { name: '', isOpen: false };
    const lB = leftOrder[mn].B || { name: '', isOpen: false };
    const rA = rightOrder[mn].A || { name: '', isOpen: false };
    const rB = rightOrder[mn].B || { name: '', isOpen: false };
    
    const leftIsOpen = lA.isOpen || lB.isOpen;
    const rightIsOpen = rA.isOpen || rB.isOpen;
    
    const leftWinner = result.winner === '左';
    const rightWinner = result.winner === '右';
    
    const leftPlayerText = leftIsOpen 
      ? 'オープン' 
      : `${lA.name || '?'}・${lB.name || '?'}`;
    const rightPlayerText = rightIsOpen
      ? 'オープン'
      : `${rA.name || '?'}・${rB.name || '?'}`;
    
    let scoreDisplay;
    if (result.score && String(result.score).trim() !== '') {
      scoreDisplay = `<div class="score">${result.score}</div>`;
    } else {
      scoreDisplay = `<div class="score pending">-</div>`;
    }
    
    html += `
      <div style="margin-bottom:6px;">
        <span class="mini-match-label">第${mn}マッチ</span>
        <div class="mini-match">
          <div class="side left ${leftWinner ? 'winner' : ''}">
            <div class="players ${leftIsOpen ? 'open' : ''}">${leftPlayerText}</div>
          </div>
          ${scoreDisplay}
          <div class="side right ${rightWinner ? 'winner' : ''}">
            <div class="players ${rightIsOpen ? 'open' : ''}">${rightPlayerText}</div>
          </div>
        </div>
      </div>
    `;
  });
  
  return html;
};

const toggleDetails = (matchId) => {
  const el = document.getElementById(`details-${matchId}`);
  const btn = el.previousElementSibling;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
    btn.textContent = '詳細を表示 ▼';
  } else {
    el.classList.add('show');
    btn.textContent = '詳細を隠す ▲';
  }
};

// ============================================================
// Gender switching
// ============================================================
const switchGender = (gender) => {
  state.currentGender = gender;
  document.querySelectorAll('.gender-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.gender === gender);
  });
  
  // セクションタイトルのカラーも変更
  document.getElementById('standingsTitle').classList.remove('male', 'female');
  document.getElementById('matchesTitle').classList.remove('male', 'female');
  const cls = gender === '男子' ? 'male' : 'female';
  document.getElementById('standingsTitle').classList.add(cls);
  document.getElementById('matchesTitle').classList.add(cls);
  
  render();
};

// ============================================================
// Auto refresh
// ============================================================
const startAutoRefresh = () => {
  fetchLiveData();
  if (state.refreshTimerId) clearInterval(state.refreshTimerId);
  state.refreshTimerId = setInterval(fetchLiveData, REFRESH_INTERVAL_MS);
};

// ============================================================
// Init
// ============================================================
startClock();
startAutoRefresh();
</script>
</body>
</html>
